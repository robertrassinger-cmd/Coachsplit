[build]
  command = '''
    if command -v flutter >/dev/null 2>&1; then
      echo "Using Flutter from PATH";
    elif [ -x /opt/buildhome/flutter/bin/flutter ]; then
      echo "Using existing Flutter SDK";
      export PATH="/opt/buildhome/flutter/bin:$PATH";
    else
      echo "Installing pinned Flutter SDK 3.44.6";
      git clone https://github.com/flutter/flutter.git --depth 1 --branch 3.44.6 /opt/buildhome/flutter;
      export PATH="/opt/buildhome/flutter/bin:$PATH";
    fi &&
    flutter config --no-analytics &&
    flutter pub get &&
    flutter build web --release --no-wasm-dry-run
  '''
  publish = "build/web"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/flutter_service_worker.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
