[build]
  command = '''
    git clone https://github.com/flutter/flutter.git --depth 1 -b stable /opt/buildhome/flutter &&
    export PATH="$PATH:/opt/buildhome/flutter/bin" &&
    flutter config --no-analytics &&
    flutter pub get &&
    flutter build web --release --no-wasm-dry-run
  '''
  publish = "build/web"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/flutter_service_worker.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
