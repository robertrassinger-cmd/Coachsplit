<!DOCTYPE html>
<html lang="de">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="CoachSplit - mobile Zeitmessung und Analyse für Trainer.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CoachSplit</title>

  <!-- PWA / Mobile -->
  <meta name="theme-color" content="#0B1118">
  <meta name="background-color" content="#0B1118">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="CoachSplit">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CoachSplit">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png?v=103rc3">

  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png?v=103rc3">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png?v=103rc3">
  <link rel="icon" type="image/png" href="favicon.png?v=103rc3">
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #0B1118;
      color: #E8EEF4;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .loading {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .logo {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      margin-bottom: 20px;
    }
    .brand {
      font-size: 26px;
      font-weight: 800;
    }
    .brand span {
      color: #2F8CFF;
    }
    .sub {
      margin-top: 8px;
      color: #AEB9C5;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <img class="logo" src="icons/Icon-192.png?v=103rc3" alt="CoachSplit">
    <div class="brand">Coach<span>Split</span></div>
    <div class="sub">Zeit. Analysiert. Verbessert.</div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (el) el.remove();
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
